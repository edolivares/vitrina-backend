name: Backend Continuous Integration (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-ci:
    name: Backend CI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/dummy?schema=public"

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma Schema
        run: pnpm exec prisma validate

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Audit Dependencies
        run: pnpm audit --prod --audit-level=high

      - name: Run Linter
        run: pnpm run lint

      - name: Run Automated Tests
        run: pnpm run test
